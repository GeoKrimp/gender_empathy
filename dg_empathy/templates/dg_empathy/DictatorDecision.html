{% extends "global/Page.html" %}
{% block content %}

<style>
  .welcome-wrap {
    max-width: 900px;
    margin: 0 auto;
  }

  .welcome-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 24px 28px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    border: 1px solid #e5e7eb;
  }

  .scale-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.9em;
    color: #6b7280;
    margin-top: 6px;
  }
</style>

<div class="welcome-wrap">
  <div class="welcome-card">

    <h2>Decision</h2>

    <p><strong>How much do you want to transfer to the other participant?</strong></p>

      <p style="color: #b91c1c; font-weight: 500;">
  Please move the slider at least once to confirm your choice, even if you choose 0.
</p>

    <div style="margin: 20px 0;">
      <label for="donation_slider">
        You transfer: <strong><span id="donation_value">0</span> cents</strong>
      </label>

      <input
        type="range"
        id="donation_slider"
        name="donation"
        min="0"
        max="20"
        value="0"
        step="0.5"
        style="width: 100%;"
      >

      <div class="scale-row">
        <span>0 cents</span>
        <span>20 cents</span>
      </div>
    </div>

    <button class="otree-btn-next btn btn-primary" id="next-btn" disabled>
      Next
    </button>

  </div>
</div>

<script>
  const slider = document.getElementById('donation_slider');
  const nextBtn = document.getElementById('next-btn');

  slider.addEventListener('input', function () {
    document.getElementById('donation_value').textContent = this.value;
    nextBtn.disabled = false;
  });
</script>

{% endblock %}
