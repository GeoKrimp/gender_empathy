{% extends "global/Page.html" %}
{% block content %}
     <style>
  .exp-wrap{ max-width: 900px; margin: 0 auto; }
  .exp-card{
    background:#fff; border-radius:16px; padding:24px 28px;
    box-shadow:0 12px 30px rgba(15,23,42,0.12);
    border:1px solid #e5e7eb;
  }
  .q-block{ margin: 18px 0 26px 0; }
  .q-title{ margin-bottom: 8px; }
  .scale-row{
    display:flex; justify-content:space-between; font-size:0.9em; color:#6b7280;
    margin-top: 6px;
  }
</style>
<div class="exp-card">
<h2>Decision</h2>

<p><strong>How much do you want to transfer to the other participant?</strong></p>

<div style="margin: 20px 0;">
  <label for="donation_slider">
    You transfer: <strong><span id="donation_value">0</span> cents</strong>
  </label>

  <input
    type="range"
    id="donation_slider"
    name="donation"
    min="0"
    max="20"
    value="0"
    step="0.5"
    style="width: 100%;"
    oninput="document.getElementById('donation_value').textContent = this.value;"
  >

  <div style="display:flex; justify-content:space-between; font-size:0.9em;">
      <span>0 cents</span>
      <span>20 cents</span>
  </div>
</div>

{% next_button %}
</div>
{% endblock %}
